experiment_name: "burnscars_hpo"
storage_uri: "./mlflow_runs"
n_trials: 20
bayesian_search: true
save_models: false
report_on_best_val: true
test_models: true

defaults:
  trainer_args:
    max_epochs: 50
    accelerator: auto
    strategy: auto
    devices: 1
    num_nodes: 1
    precision: bf16-mixed
    log_every_n_steps: 1

  terratorch_task:
    model_factory: EncoderDecoderFactory
    model_args:
      backbone: prithvi_eo_v2_300_tl
      backbone_pretrained: true
      backbone_num_frames: 1
      backbone_img_size: 512
      backbone_bands:
        - BLUE
        - GREEN
        - RED
        - NIR_NARROW
        - SWIR_1
        - SWIR_2
      necks:
        - name: SelectIndices
          indices: [5, 11, 17, 23]
        - name: ReshapeTokensToImage
        - name: LearnedInterpolateToPyramidal
      decoder: UNetDecoder
      decoder_channels: [512, 256, 128, 64]
      head_dropout: 0.1
      num_classes: 2
    loss: ce
    optimizer: AdamW
    ignore_index: -1
    freeze_backbone: true
    freeze_decoder: false
    class_names:
      - no burned
      - burned

tasks:
  - name: burnscars
    type: segmentation
    direction: max
    metric: val/mIoU
    datamodule:
      class_path: GenericNonGeoSegmentationDataModule
      init_args:
        batch_size: 4
        num_workers: 2
        num_classes: 2
        train_data_root: data/hls_burn_scars/data
        train_label_data_root: data/hls_burn_scars/data
        val_data_root: data/hls_burn_scars/data
        val_label_data_root: data/hls_burn_scars/data
        test_data_root: data/hls_burn_scars/data
        test_label_data_root: data/hls_burn_scars/data
        train_split: data/hls_burn_scars/splits/train.txt
        val_split: data/hls_burn_scars/splits/val.txt
        test_split: data/hls_burn_scars/splits/test.txt
        img_grep: "*_merged.tif"
        label_grep: "*.mask.tif"
        means:
          - 0.033349706741586264
          - 0.05701185520536176
          - 0.05889748132001316
          - 0.2323245113436119
          - 0.1972854853760658
          - 0.11944914225186566
        stds:
          - 0.02269135568823774
          - 0.026807560223070237
          - 0.04004109844362779
          - 0.07791732423672691
          - 0.08708738838140137
          - 0.07241979477437814
        no_data_replace: 0
        no_label_replace: -1
        train_transform:
          - class_path: albumentations.D4
          - class_path: ToTensorV2

optimization_space:
  lr:
    min: 0.00001
    max: 0.01
    type: real
    log: true
  optimizer_hparams:
    weight_decay:
      min: 0.001
      max: 0.1
      type: real
      log: true
  model_args:
    head_dropout:
      min: 0.0
      max: 0.5
      type: real
